name: booknest
description: Aplikasi manajemen koleksi buku pribadi

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # HTTP Client untuk Open Library API
  http: ^1.2.1

  # UI Components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0

  # Utils
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
