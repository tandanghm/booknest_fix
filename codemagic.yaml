workflows:
  android-workflow:
    name: BookNest Android APK
    max_build_duration: 60
    environment:
      flutter: 3.19.0
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build Debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
